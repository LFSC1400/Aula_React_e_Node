<!DOCTYPE html>
<html>
    <head>
        <title>Validate</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
            integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
            crossorigin="anonymous"
        >
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link href="css/estilo.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top bg-primary">
            <!-- sticky-top -> fixo no topo com espaço com conteúdo abaixo)-->
            <a class="navbar-brand" href="index.html">Minha app</a>
        </nav>
        <div class="container mt-3">
            <div class="row mb-3">
                <div class="col-md-12 col-sm-12 mb-2">
                    <form
                        class="cmxform"
                        id="formExemplo"
                        method="get"
                        action
                    >
                        <fieldset>
                            <!--https://jqueryvalidation.org/documentation/-->
                            <div class="form-group">
                                <label for="txtnome">Nome</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="nome aqui"
                                    id="txtnome"
                                    required
                                    minlength="2"
                                    name="txtnome"
                                >
                            </div>

                            <div class="form-group">
                                <label for="txtemail">E-mail</label>
                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="e-mail aqui"
                                    id="txtemail"
                                    name="txtemail"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="txtfilhos">Número de filhos</label>
                                <input
                                    type="number inteiro"
                                    class="form-control"
                                    placeholder="número de filhos aqui"
                                    id="txtfilhos"
                                    required
                                    minlength="1"
                                    name="txtfilhos"
                                >
                            </div>

                            <div class="form-group">
                                <label for="txtsalario">Sálario</label>
                                <input
                                    type="number inteiro"
                                    class="form-control"
                                    placeholder="sálario aqui"
                                    id="txtsalario"
                                    required
                                    minlength="2"
                                    name="txtsalario"
                                >
                            </div>

                            <div class="form-group">
                                <label for="txtdata">Data de Admissão</label>
                                <input
                                    type="date"
                                    class="form-control"
                                    placeholder="data aqui"
                                    id="txtdata"
                                    required
                                    minlength="2"
                                    name="txtdata"
                                >
                            </div>

                            <div class="form-group">
                                <label for="txtrede">Endereço Rede Social</label>
                                <input
                                    type="url"
                                    class="form-control"
                                    placeholder="sua rede aqui"
                                    id="txtrede"
                                    required
                                    minlength="2"
                                    name="txtrede"
                                >
                            </div>

                            <input type="submit" class="btn btn-danger" value="Enviar">
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>
    </body>
</html>
